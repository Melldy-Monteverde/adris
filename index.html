<!DOCTYPE html>
<html lang="PT">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- opengrpah-->
  <meta property="og:title" content="Adris Restaurant - Drinks Menu" />
  <meta property="og:description"
    content="Descubra a nossa seleção de bebidas premium. Desde cocktails artesanais a vinhos requintados. Venha e aproveite!" />
  <meta property="og:image" content=https://adris-restaurant.netlify.app/assets/adris_logo_short_bg.png>
  <meta property="og:url" content="https://adris-restaurant.netlify.app/" />
  <meta property="og:type" content="Drinks menu" />
  <meta property="og:site_name" content="Adris Restaurant" />

  <title>Adris - Restaurant</title>
  <link rel="icon" href="./assets/adris_icon.jpg" type="image/x-icon" />
  <!-- bs -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <!-- css -->
  <link href="./style/style.css" rel="stylesheet" />

  <!-- fontawesome -->
  <script src="https://kit.fontawesome.com/d759deb17c.js" crossorigin="anonymous"></script>

  <script type="module" src="./js/app.js"></script>
</head>

<body>
  <!-- Loader -->
  <div id="loader">
    <!-- <div class="glass">
      <div class="liquid"></div>
    </div> -->
    
    <div class="logo-loader"></div>
    <p class="loading-text">A preparar sua bebida…</p>
  </div>

  <!-- full content -->
  <div id="page-content" class="d-none">

    <header class="m-3 text-center">
      <img class="img-fluid mx-auto logo_adris" src="./assets/adris_logo_short_bg.png" alt="adris logo" />
    </header>

    <main class="accordion p-3" id="menuAccordion">
        <!-- Menu categories will be dynamically inserted here -->
    </main>

    <div id="carouselExampleAutoplaying" class="carousel slide carousel-fade mx-3 my-3" data-bs-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="./assets/images/foto1.jpeg" class="d-block w-100 img-fluid" alt="foto" />
        </div>
        <div class="carousel-item">
          <img src="./assets/images/foto2.jpeg" class="d-block w-100 img-fluid" alt="foto" />
        </div>
        <div class="carousel-item">
          <img src="./assets/images/foto3.jpeg" class="d-block w-100 img-fluid" alt="foto" />
        </div>
        <div class="carousel-item">
          <img src="./assets/images/foto4.jpeg" class="d-block w-100 img-fluid" alt="foto" />
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying"
        data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying"
        data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>

    <section class="text-center iva-section bg-dark bg-gradient bg-opacity-50 mx-3 mb-3 fw-light rounded">
      IVA INCLUÍDO À TAXA EM VIGOR - VAT INCLUDED
    </section>

    <footer id="footer" class="footer d-flex flex-column justify-content-center align-items-center">
      <!-- Caixa de comentarios -->
      <section class="ti-widget py-3 px-2">
        <div class="reviews-contentor">
          <!-- test -->
          <button type="button" class="btn bg-light btn-lg">
            <a href="https://maps.app.goo.gl/uAKajBVzADmRbCNK6" target="_blank">
              <img src="./assets/icons/google.svg" alt="logo google" class="img-btn" />
              <div class="review-content">
                <div class="review-score">4.5</div>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star-half-stroke stars"></span>
                <div class="review-count">+900 reviews</div>
              </div>
            </a>
          </button>

          <button type="button" class="btn bg-light btn-lg">
            <a href="https://www.thefork.pt/restaurante/adris-r605439" target="_blank">
              <img src="./assets/icons/thefork.png" alt="thefork logo" class="img-btn" />
              <div class="review-content">
                <div class="review-score">9/10</div>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star-half-stroke stars"></span>
                <div class="review-count">+300 reviews</div>
              </div>
            </a>
          </button>

          <button type="button" class="btn bg-light btn-lg">
            <a href="https://www.tripadvisor.pt/Restaurant_Review-g652081-d8444925-Reviews-Adris-Praia_da_Rocha_Portimao_Faro_District_Algarve.html"
              target="_blank">
              <img src="./assets/icons/Tripadvisor_logoset_solid_green.svg" alt="tripadvisor logo" class="img-btn" />
              <div class="review-content">
                <div class="review-score">4.5</div>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star stars"></span>
                <span class="fa-solid fa-star-half-stroke stars"></span>
                <div class="review-count">+800 reviews</div>
              </div>
            </a>
          </button>
      </section>

      <!-- Redes Sociales -->
      <div class="social_media_container my-3">
        <a href="https://www.instagram.com/adris.restaurant?igsh=ZncyOHd6bG83bzA1" class="social_media_link"
          target="_blank">
          <img src="./assets/icons/instagram_1.svg" alt="Instagram logo" class="social_media_ig" />
        </a>
      </div>
  </div>
  </footer>

  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>

</html>
